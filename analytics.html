<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Runner Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 48px;
            margin: 30px 0;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-card .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chart-container h2 {
            margin-bottom: 20px;
            color: #FFD700;
        }
        
        .daily-bar {
            display: flex;
            align-items: center;
            margin: 10px 0;
            gap: 10px;
        }
        
        .daily-bar .date {
            width: 100px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .daily-bar .bar-wrapper {
            flex: 1;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        
        .daily-bar .bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .daily-bar .count {
            width: 50px;
            text-align: right;
            font-weight: bold;
            color: #FFD700;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            font-size: 24px;
            padding: 50px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .top-players {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .top-players h2 {
            margin-bottom: 20px;
            color: #FFD700;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .player-row:nth-child(1) { border-left: 4px solid #FFD700; }
        .player-row:nth-child(2) { border-left: 4px solid #C0C0C0; }
        .player-row:nth-child(3) { border-left: 4px solid #CD7F32; }
        
        .refresh-time {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Runner Analytics</h1>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="loadAnalytics()">🔄 Daten aktualisieren</button>
        </div>
        
        <div id="loading" class="loading">Lade Daten...</div>
        
        <div id="content" style="display: none;">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Gesamt Einträge</h3>
                    <div class="value" id="totalScores">0</div>
                    <div class="label">Alle Scores</div>
                </div>
                
                <div class="stat-card">
                    <h3>Unique Spieler</h3>
                    <div class="value" id="uniquePlayers">0</div>
                    <div class="label">Verschiedene Namen</div>
                </div>
                
                <div class="stat-card">
                    <h3>Höchster Score</h3>
                    <div class="value" id="highestScore">0</div>
                    <div class="label" id="highestPlayer">-</div>
                </div>
                
                <div class="stat-card">
                    <h3>Durchschnitt</h3>
                    <div class="value" id="avgScore">0</div>
                    <div class="label">Ø Score</div>
                </div>
            </div>
            
            <!-- Daily Growth Chart -->
            <div class="chart-container">
                <h2>📈 Neue Einträge pro Tag</h2>
                <div id="dailyChart"></div>
            </div>
            
            <!-- Top Players -->
            <div class="top-players">
                <h2>🏆 Top 10 Spieler</h2>
                <div id="topPlayers"></div>
            </div>
            
            <div class="refresh-time">
                Letzte Aktualisierung: <span id="lastRefresh">-</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js';
        import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA4UMR2WEw_ggya5gPHsNjqudQo0lW8C2w",
            authDomain: "runners-game.firebaseapp.com",
            databaseURL: "https://runners-game-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "runners-game",
            storageBucket: "runners-game.appspot.com",
            messagingSenderId: "917364422556",
            appId: "1:917364422556:web:6947c132a12e5953d9fa59",
            measurementId: "G-PSZLWSSTQX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.loadAnalytics = async function() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';

            try {
                // Load data from monthly highscores
                const monthlyRef = ref(db, 'monthly_highscores');
                const snapshot = await get(monthlyRef);
                
                if (!snapshot.exists()) {
                    alert('Keine Daten gefunden!');
                    return;
                }

                const data = snapshot.val();
                let allScores = [];

                // Collect all scores from all months
                Object.entries(data).forEach(([month, monthData]) => {
                    if (monthData.scores) {
                        Object.entries(monthData.scores).forEach(([key, score]) => {
                            allScores.push({
                                ...score,
                                month,
                                key
                            });
                        });
                    }
                });

                // Calculate statistics
                const totalScores = allScores.length;
                const uniquePlayers = new Set(allScores.map(s => s.name)).size;
                const sortedScores = [...allScores].sort((a, b) => b.score - a.score);
                const highestScore = sortedScores[0];
                const avgScore = Math.round(allScores.reduce((sum, s) => sum + s.score, 0) / totalScores);

                // Group by date
                const scoresByDate = {};
                allScores.forEach(score => {
                    const date = new Date(score.timestamp).toLocaleDateString('de-DE');
                    scoresByDate[date] = (scoresByDate[date] || 0) + 1;
                });

                // Sort dates
                const sortedDates = Object.keys(scoresByDate).sort((a, b) => {
                    const dateA = new Date(a.split('.').reverse().join('-'));
                    const dateB = new Date(b.split('.').reverse().join('-'));
                    return dateA - dateB;
                });

                // Update UI
                document.getElementById('totalScores').textContent = totalScores;
                document.getElementById('uniquePlayers').textContent = uniquePlayers;
                document.getElementById('highestScore').textContent = highestScore.score;
                document.getElementById('highestPlayer').textContent = highestScore.name;
                document.getElementById('avgScore').textContent = avgScore;

                // Draw daily chart
                const maxDaily = Math.max(...Object.values(scoresByDate));
                const dailyChartHTML = sortedDates.map(date => {
                    const count = scoresByDate[date];
                    const percentage = (count / maxDaily) * 100;
                    return `
                        <div class="daily-bar">
                            <div class="date">${date}</div>
                            <div class="bar-wrapper">
                                <div class="bar" style="width: ${percentage}%">
                                    ${count > 2 ? count : ''}
                                </div>
                            </div>
                            <div class="count">${count}</div>
                        </div>
                    `;
                }).join('');
                document.getElementById('dailyChart').innerHTML = dailyChartHTML;

                // Top 10 players
                const topPlayersHTML = sortedScores.slice(0, 10).map((score, i) => {
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
                    const date = new Date(score.timestamp).toLocaleDateString('de-DE');
                    return `
                        <div class="player-row">
                            <span>${medal} ${score.name}</span>
                            <span>${score.score} Punkte</span>
                            <span style="color: rgba(255,255,255,0.5); font-size: 12px;">${date}</span>
                        </div>
                    `;
                }).join('');
                document.getElementById('topPlayers').innerHTML = topPlayersHTML;

                // Update refresh time
                document.getElementById('lastRefresh').textContent = new Date().toLocaleString('de-DE');

                // Show content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                console.log('📊 Analytics geladen:', {
                    totalScores,
                    uniquePlayers,
                    highestScore: highestScore.score,
                    avgScore,
                    daysWithData: sortedDates.length
                });

            } catch (error) {
                console.error('Fehler:', error);
                alert('Fehler beim Laden der Daten: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        };

        // Auto-load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadAnalytics();
        });
    </script>
</body>
</html>
