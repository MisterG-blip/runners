<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cube Runner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #0a0a0a;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        /* ── Mobile Controls ── */
        #mobile-controls {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            z-index: 1000;
            display: none;          /* versteckt bis Modus gewählt */
            justify-content: center;
            gap: 14px;
            align-items: center;
        }

        .mobile-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s, opacity 0.15s;
            background: rgba(255,255,255,0.1);
        }
        .mobile-btn:active { transform: scale(0.88); }

        #jump-btn {
            width: 80px;
            height: 80px;
            font-size: 26px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 6px 18px rgba(102,126,234,0.4);
        }

        #ghost-btn { background: rgba(0,200,255,0.18); }
        #slow-btn  { background: rgba(255,190,0,0.18); }
        #mute-btn  { font-size: 18px; }

        /* Practice-only – initial hidden */
        #practice-controls { display: none; }

        /* ── Name-ändern Button ── */
        #name-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 1001;
            display: none;          /* nur im Game-Over sichtbar */
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
        }
        #name-btn:active { opacity: 0.5; }

        .loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- Mobile Controls: erscheinen erst nach Moduswahl -->
    <div id="mobile-controls">
        <!-- Practice-only (links) -->
        <div id="practice-controls" style="display:none;gap:10px;align-items:center;">
            <button class="mobile-btn" id="ghost-btn" title="Ghost-Bot">👻</button>
            <button class="mobile-btn" id="slow-btn"  title="Slow-Motion">🐢</button>
        </div>

        <!-- Jump (Mitte) -->
        <button class="mobile-btn" id="jump-btn">↑</button>

        <!-- Mute (rechts) -->
        <button class="mobile-btn" id="mute-btn" title="Ton ein/aus">🔊</button>
    </div>

    <!-- Name ändern – nur im Game-Over -->
    <button id="name-btn">✏️ Name ändern</button>

    <div class="loading" id="loading">Lade Spiel…</div>

    <script type="module" src="main.js"></script>

    <script>
        const mc       = document.getElementById('mobile-controls');
        const pc       = document.getElementById('practice-controls');
        const nameBtn  = document.getElementById('name-btn');
        const muteBtn  = document.getElementById('mute-btn');

        // Arcade: nur Jump + Mute anzeigen
        window.addEventListener('arcadeMode', () => {
            mc.style.display = 'flex';
            pc.style.display = 'none';
        });

        // Practice: alle Buttons anzeigen
        window.addEventListener('practiceMode', () => {
            mc.style.display = 'flex';
            pc.style.display = 'flex';
        });

        // Name-Button: nur im Game-Over einblenden
        window.addEventListener('gameOver', () => {
            nameBtn.style.display = 'block';
        });
        window.addEventListener('gameRestart', () => {
            nameBtn.style.display = 'none';
        });

        // Name-Button Aktion
        nameBtn.addEventListener('click', () => {
            window.dispatchEvent(new CustomEvent('changeName'));
        });

        // Mute-Icon toggeln
        muteBtn?.addEventListener('click', function() {
            this.textContent = this.textContent === '🔊' ? '🔇' : '🔊';
        });
    </script>
</body>
</html>
